<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IP Address Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="./style.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
  <script src="./src/app.js" defer></script>
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <h1 class="title">IP Address Tracker</h1>

      <form id="ip-form" class="search" novalidate>
        <label for="ip-input" class="sr-only">Search for any IP address or domain</label>
        <input
          type="text"
          id="ip-input"
          name="query"
          class="search__input"
          placeholder="Search for any IP address or domain"
          aria-describedby="form-error"
          autocomplete="off"
          required
        >
        <button type="submit" id="search-btn" class="search__button" aria-label="Search">
          <img src="./images/icon-arrow.svg" alt="" aria-hidden="true">
        </button>
      </form>
      <p id="form-error" class="error-text" role="alert" aria-live="assertive"></p>

      <section class="info-card" aria-live="polite">
        <div class="info-card__item">
          <h2 class="info-card__label">IP Address</h2>
          <p id="ip-display" class="info-card__value">--</p>
        </div>

        <div class="info-card__item">
          <h2 class="info-card__label">Location</h2>
          <p id="location-display" class="info-card__value">--</p>
        </div>

        <div class="info-card__item">
          <h2 class="info-card__label">Timezone</h2>
          <p id="timezone-display" class="info-card__value">--</p>
        </div>

        <div class="info-card__item">
          <h2 class="info-card__label">ISP</h2>
          <p id="isp-display" class="info-card__value">--</p>
        </div>
      </section>
    </header>

    <main>
      <div id="map" role="application" aria-label="IP location map"></div>
    </main>
  </div>
</body>
</html>
